name: homes
version: ${project.version}
main: com.example.homes.HomesPlugin
api-version: 1.21
author: naonao
website: https://github.com/paper0319/homes-plugin
commands:
  home:
    description: ホームにテレポートする
    usage: /home <名前>
  homes:
    description: ホーム画面(GUI)を開く
    usage: /homes [list]
  sethome:
    description: ホームを設定する
    usage: /sethome <名前>
  delhome:
    description: ホームを削除する
    usage: /delhome <名前>
  vhome:
    description: 他のプレイヤーの公開ホームを訪問する
    usage: /vhome <プレイヤー名>
  tpa:
    description: テレポートリクエストを送信する
    usage: /tpa <プレイヤー名>
  tpahere:
    description: 自分の場所にテレポートさせるリクエストを送信する
    usage: /tpahere <プレイヤー名>
  tpaccept:
    description: テレポートリクエストを承認する
    usage: /tpaccept
  tpdeny:
    description: テレポートリクエストを拒否する
    usage: /tpdeny
  tpcancel:
    description: テレポートリクエストをキャンセルする
    usage: /tpcancel <プレイヤー名>
  tpatoggle:
    description: テレポートリクエストの受信設定を切り替える
    usage: /tpatoggle
  tpaignore:
    description: 特定のプレイヤーからのリクエストを無視する
    usage: /tpaignore <プレイヤー名>
  back:
    description: 直前の場所に戻る
    usage: /back
permissions:
  homes.admin:
    description: 他人のホームを閲覧・管理する権限
    default: op
  homes.reload:
    description: /homes reload で設定を再読み込みする権限
    default: op
  # ホーム数の個別上限。LuckPerms 等で付与して使います:
  #   homes.limit.<数字>    例: homes.limit.10 で最大10個
  #   homes.limit.unlimited 無制限
  # default: false なので、付与しなければ settings.default-home-limit が適用されます (OPも同様)。
  homes.limit.unlimited:
    description: ホーム数を無制限にする
    default: false
  homes.limit.*:
    description: ホーム数を無制限にする (homes.limit.unlimited と同等)
    default: false

