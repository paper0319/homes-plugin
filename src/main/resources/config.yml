settings:
  # 表示に使う言語ファイル (lang/<language>.yml)。標準で ja(日本語) と en(英語) を同梱。
  # 別の言語を追加したい場合は lang/ フォルダに <language>.yml を作成してください。
  language: ja

  # ============================================================
  #  ホーム数の上限
  # ============================================================
  # すべてのプレイヤー共通の基本上限です。OP も含め、特に権限が無ければこの値になります。
  # 一部のプレイヤーやグループだけ上限を変えたい場合は、LuckPerms 等で
  # 次の権限を付与してください (config では設定しません):
  #   homes.limit.<数字>      例: homes.limit.10  → 最大10個まで
  #   homes.limit.unlimited   → 無制限
  # 複数の数字権限を持つ場合は一番大きい値が使われます。
  default-home-limit: 3

  # ホーム名・メモに入力できる最大文字数
  max-home-name-length: 32
  max-home-memo-length: 15

  # ============================================================
  #  テレポート
  # ============================================================
  teleport:
    # テレポートが実行されるまでの待機秒数 (0 にすると即時テレポート)
    delay: 3

    # ホームが危険な場所(溶岩・空中など安全な足場が無い)だったときの動作:
    #   true  → 確認GUIを開き、「はい」をクリックすると強行テレポート
    #   false → テレポートを中止する
    confirm-unsafe: true

    # 【上級者向け】安全な着地点を探す範囲。通常は変更しなくて構いません。
    safe-search:
      radius: 2      # 水平方向(東西南北)に探す半径 (ブロック数)
      vertical: 3    # 上下方向に探す範囲 (ブロック数)

  # ============================================================
  #  各機能の ON / OFF
  # ============================================================
  # TPA (テレポートリクエスト) 機能
  tpa:
    enabled: true       # /tpa, /tpahere などを使えるようにするか
    cooldown: 60        # TPA送信後、次に送れるまでのクールダウン (秒)

  # /back (直前の場所・死亡地点に戻る) 機能
  back:
    enabled: true       # /back を使えるようにするか (テレポート前・死亡地点の保存も含む)

  # アップデート確認
  update-check:
    enabled: true       # Modrinthで最新版を確認し、OPに通知するか

economy:
  enabled: false
  cost:
    set-home: 1000.0
    teleport: 50.0
    make-public: 5000.0

database:
  # h2, mariadb, or mysql
  type: h2
  host: localhost
  port: 3306
  name: minecraft
  user: root
  password: ""

sounds:
  teleport-count: BLOCK_NOTE_BLOCK_PLING
  teleport-success: ENTITY_ENDERMAN_TELEPORT
  teleport-fail: ENTITY_VILLAGER_NO
  gui-click: UI_BUTTON_CLICK
  delete-success: ENTITY_GENERIC_EXPLODE
  # Set to NONE to disable specific sound

gui:
  title: "ホーム一覧"
  # 他プレイヤーのホームを見るとき (/vhome) のタイトル
  title-other: "{player}のホーム"
  delete-mode-title: "&c削除モード (クリックで削除)"
  public-mode-title: "&b公開設定モード (クリックで切替)"
  rename-mode-title: "&eリネームモード (クリックで名前変更)"
  favorite-mode-title: "&eお気に入りモード (クリックで切替)"
  memo-mode-title: "&eメモ編集モード (クリックで編集)"
  create-button:
    name: "&aホームを作成する"
    lore:
      - "&7クリックして名前を入力"
  rename-button:
    name-off: "&aリネームモード: OFF"
    name-on: "&eリネームモード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとチャットで新しい名前を入力できます"
  delete-button:
    name-off: "&a削除モード: OFF"
    name-on: "&c削除モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&cホームをクリックすると削除確認画面へ移動します！"
  public-button:
    name-off: "&a公開設定モード: OFF"
    name-on: "&b公開設定モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&bホームをクリックすると公開/非公開を切り替えます"
  search-button:
    name: "&a検索"
    lore:
      - "&7クリックして検索文字を入力"
      - "&7'clear' で解除"
  favorite-button:
    name-off: "&aお気に入りモード: OFF"
    name-on: "&eお気に入りモード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとお気に入りを切り替えます"
  memo-button:
    name-off: "&aメモ編集モード: OFF"
    name-on: "&eメモ編集モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとメモを編集できます"
  home-icon:
    name: "&b{name}"
    default-material: LIGHT_BLUE_BED
    # ワールドごとのアイコン設定 (ワールド名: マテリアル)
    world-icons:
      world_nether: CRIMSON_FUNGUS
      world_the_end: END_STONE
      # world: GRASS_BLOCK
    lore:
      - "&7ワールド: {world}"
      - "&7X: {x} Y: {y} Z: {z}"
    lore-teleport:
      - "&eクリックしてテレポート"
    lore-delete:
      - "&cクリックして削除"
  confirm-delete:
    title: "&c本当に削除しますか？"
    yes-button:
      name: "&aはい、削除します"
      lore:
        - "&7この操作は取り消せません"
    no-button:
      name: "&cいいえ、キャンセルします"
      lore:
        - "&7ホーム一覧に戻ります"
  # 危険な場所(安全な足場が無い・別ディメンションなど)へテレポートする前の確認GUI
  confirm-teleport:
    title: "&c危険な場所へテレポート？"
    yes-button:
      name: "&aはい、テレポートします"
      lore:
        - "&7安全な足場が無い場所です"
        - "&7落下・溶岩などに注意してください"
    info:
      name: "&e危険な足場のため確認が必要です"
      lore:
        - "&7このまま進むとダメージを受ける"
        - "&7可能性があります"
    no-button:
      name: "&cいいえ、やめます"
      lore:
        - "&7テレポートをキャンセルします"
  tpa:
    title: "&aTPAリクエスト一覧"
    title-page-suffix: " [{page}/{total}]"
    border-material: BLUE_STAINED_GLASS_PANE
    refresh-button:
      material: EMERALD_BLOCK
      name: "&a更新"
      lore:
        - "&7オンラインリストを再取得"
    prev-button:
      material: ARROW
      name: "&a← 前のページ"
    next-button:
      material: ARROW
      name: "&a次のページ →"
    head:
      name: "&e{player}"
      lore:
        - "&7クリックして選択"
  tpa-action:
    title: "&a{player}にリクエスト"
    border-material: BLUE_STAINED_GLASS_PANE
    tpa-button:
      material: LIGHT_BLUE_WOOL
      name: "&b/TPA"
      lore:
        - "&7あなたが {player} のところへ移動"
    tpahere-button:
      material: LIME_WOOL
      name: "&a/TPAHere"
      lore:
        - "&7{player} をあなたのところへ呼ぶ"
    back-button:
      material: ARROW
      name: "&c← 戻る"

# メッセージ文言は lang/<language>.yml に移動しました。
# config.yml の settings.language で言語を切り替えられます。
