settings:
  default-home-limit: 3
  # OP/管理者権限を持つプレイヤーのホーム上限 (デフォルト: 100)
  # -1 に設定すると無制限になります（実際にはInteger.MAX_VALUE）
  op-home-limit: 100
  max-home-name-length: 32
  max-home-memo-length: 15
  teleport-delay: 3
  safe-teleport:
    search-radius: 2
    vertical-range: 3
  # === TPA (テレポートリクエスト) 設定 ===
  tpa:
    enabled: true       # TPAコマンド (/tpa, /tpahere 等) を有効にするか
    cooldown: 60        # TPA送信後のクールダウン (秒)

  # === /back コマンド 設定 ===
  back:
    enabled: true              # /back コマンドを有効にするか (テレポート前・死亡地点の保存も含む)

economy:
  enabled: false
  cost:
    set-home: 1000.0
    teleport: 50.0
    make-public: 5000.0

database:
  # h2, mariadb, or mysql
  type: h2
  host: localhost
  port: 3306
  name: minecraft
  user: root
  password: ""

sounds:
  teleport-count: BLOCK_NOTE_BLOCK_PLING
  teleport-success: ENTITY_ENDERMAN_TELEPORT
  teleport-fail: ENTITY_VILLAGER_NO
  gui-click: UI_BUTTON_CLICK
  delete-success: ENTITY_GENERIC_EXPLODE
  # Set to NONE to disable specific sound

gui:
  title: "ホーム一覧"
  delete-mode-title: "&c削除モード (クリックで削除)"
  public-mode-title: "&b公開設定モード (クリックで切替)"
  rename-mode-title: "&eリネームモード (クリックで名前変更)"
  favorite-mode-title: "&eお気に入りモード (クリックで切替)"
  memo-mode-title: "&eメモ編集モード (クリックで編集)"
  create-button:
    name: "&aホームを作成する"
    lore:
      - "&7クリックして名前を入力"
  rename-button:
    name-off: "&aリネームモード: OFF"
    name-on: "&eリネームモード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとチャットで新しい名前を入力できます"
  delete-button:
    name-off: "&a削除モード: OFF"
    name-on: "&c削除モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&cホームをクリックすると削除確認画面へ移動します！"
  public-button:
    name-off: "&a公開設定モード: OFF"
    name-on: "&b公開設定モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&bホームをクリックすると公開/非公開を切り替えます"
  search-button:
    name: "&a検索"
    lore:
      - "&7クリックして検索文字を入力"
      - "&7'clear' で解除"
  favorite-button:
    name-off: "&aお気に入りモード: OFF"
    name-on: "&eお気に入りモード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとお気に入りを切り替えます"
  memo-button:
    name-off: "&aメモ編集モード: OFF"
    name-on: "&eメモ編集モード: ON"
    lore-off:
      - "&7クリックしてONにする"
    lore-on:
      - "&7クリックしてOFFにする"
      - "&eホームをクリックするとメモを編集できます"
  home-icon:
    name: "&b{name}"
    default-material: LIGHT_BLUE_BED
    # ワールドごとのアイコン設定 (ワールド名: マテリアル)
    world-icons:
      world_nether: CRIMSON_FUNGUS
      world_the_end: END_STONE
      # world: GRASS_BLOCK
    lore:
      - "&7ワールド: {world}"
      - "&7X: {x} Y: {y} Z: {z}"
    lore-teleport:
      - "&eクリックしてテレポート"
    lore-delete:
      - "&cクリックして削除"
  confirm-delete:
    title: "&c本当に削除しますか？"
    yes-button:
      name: "&aはい、削除します"
      lore:
        - "&7この操作は取り消せません"
    no-button:
      name: "&cいいえ、キャンセルします"
      lore:
        - "&7ホーム一覧に戻ります"

