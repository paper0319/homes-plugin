name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Read version from pom.xml
        id: version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits since previous tag
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${{ github.ref_name }}$" | head -n 1)
          if [ -n "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s" "$PREV..${{ github.ref_name }}")
            RANGE="$PREV..${{ github.ref_name }}"
          else
            LOG=$(git log --pretty=format:"- %s" "${{ github.ref_name }}")
            RANGE="(initial release)"
          fi
          echo "Changes for $RANGE:" >&2
          echo "$LOG" >&2
          # Optional upgrade note: shown only when .github/release-notes.md targets this version
          NOTE=""
          if [ -f .github/release-notes.md ]; then
            NOTE_VERSION=$(head -n 1 .github/release-notes.md)
            if [ "$NOTE_VERSION" = "$VERSION" ]; then
              NOTE=$(tail -n +2 .github/release-notes.md)
            fi
          fi
          {
            echo "body<<__EOF__"
            if [ -n "$NOTE" ]; then
              echo "$NOTE"
              echo ""
            fi
            echo "## Changes"
            echo ""
            echo "$LOG"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls target/HomesPlugin-${{ steps.version.outputs.version }}.jar)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Release & Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: BmLjlw32
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          changelog: ${{ steps.changelog.outputs.body }}

          files: ${{ steps.jar.outputs.path }}
          name: HomesPlugin ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: release

          loaders: paper
          game-versions: ">=1.21 <1.22"
          java: 21
